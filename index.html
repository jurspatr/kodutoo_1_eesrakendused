<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="clock.css">
    <title>Patrick Jurs - Clock</title>
</head>
<body>
    <div id="container">
        <div id="clockContainer">
            <div id="hours">00:</div>
            <div id="minutes">00:</div>
            <div id="seconds">00</div>
        </div>
        <div id="dateContainer">
            <div id="weekday"></div>
            <div id="day">01.</div>
            <div id="month">01.</div>
            <div id="year">2000</div>
        </div>
        <div id="author">Patrick Jurs</div>
        <div id="repo">
            <a href="https://github.com/jurspatr/kodutoo_1_eesrakendused" target="_blank">GitHub</a>
        </div>
        <div id="controls">
            <button id="colorBtn">Color</button>
            <button id="bgBtn">BG</button>
            <button id="sizeBtn">Size</button>
            <button id="posBtn">Pos</button>
            <button id="formatBtn">12h</button>
            <button id="themeBtn">Theme</button>
            <input type="color" id="picker" value="#ffffff" title="Pick Color">
        </div>
    </div>
</body>
</html>
